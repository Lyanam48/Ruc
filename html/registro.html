<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro de Empresas - CEPANIM</title>
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/registro.css" />
  <style>
    .status-msg { display:none; padding:10px 14px; border-radius:6px; font-size:0.85rem; margin-top:10px; }
    .status-msg.error { background:#fde8e8; color:#842029; border:1px solid #f5c6cb; }
    .status-msg.success { background:#e8f8ee; color:#1e7e34; border:1px solid #a3d9b1; }
  </style>
</head>
<body class="registro">
  <div class="registro-card">
    <div class="registro-top-bar"></div>
    <div class="registro-body">
      <h2 class="registro-title">Registro de Empresas</h2>
      <p class="registro-subtitle">Ministerio de Economía y Finanzas</p>
      <div class="form-divider"></div>

      <form id="formRegistro" novalidate>

        <div class="form-group">
          <label class="form-label" for="empresa">Nombre de la Empresa</label>
          <input class="form-input" id="empresa" type="text" placeholder="Nombre completo de la empresa" />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="ruc">RUC / NIT (DGI)</label>
            <input class="form-input" id="ruc" type="text" placeholder="Ej: 8-123-456" />
          </div>
          <div class="form-group">
            <label class="form-label" for="razonSocial">Razón Social</label>
            <input class="form-input" id="razonSocial" type="text" placeholder="Razón social" />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="direccion">Dirección Fiscal</label>
          <input class="form-input" id="direccion" type="text" placeholder="Dirección fiscal registrada" />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="telefono">Teléfono</label>
            <input class="form-input" id="telefono" type="tel" placeholder="Ej: 223-4567" />
          </div>
          <div class="form-group">
            <label class="form-label" for="email">Correo Electrónico</label>
            <input class="form-input" id="email" type="email" placeholder="correo@empresa.com" />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="fechaConst">Fecha de Constitución</label>
          <input class="form-input" id="fechaConst" type="date" />
        </div>

        <div class="form-group">
          <label class="form-label" for="repLegal">Representante Legal</label>
          <input class="form-input" id="repLegal" type="text" placeholder="Nombre completo del representante" />
        </div>

        <div class="form-group">
          <label class="form-label" for="numResolucion">Número de Resolución DGI</label>
          <input class="form-input" id="numResolucion" type="text" placeholder="Número de resolución" />
        </div>

        <div class="form-group">
          <label class="form-label" for="tipoServicio">Tipo de Servicio que Brinda</label>
          <select class="form-select" id="tipoServicio">
            <option value="">Seleccione...</option>
            <option value="comercial">Comercial</option>
            <option value="industrial">Industrial</option>
            <option value="servicios">Servicios Profesionales</option>
            <option value="tecnologia">Tecnología</option>
            <option value="construccion">Construcción</option>
            <option value="salud">Salud</option>
            <option value="educacion">Educación</option>
            <option value="otro">Otro</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label" for="descServicio">Descripción del Servicio</label>
          <textarea class="form-textarea" id="descServicio" placeholder="Escriba una breve descripción..."></textarea>
        </div>

        <p id="statusMsg" class="status-msg"></p>

        <button type="submit" class="btn btn-primary registro-submit">Registrar Empresa</button>
      </form>

      <span class="registro-back" id="btnBack">&#8592; Volver al login</span>
    </div>
  </div>

  <script src="../js/main.js"></script>
  <script src="../js/registro.js"></script>
</body>
</html>
