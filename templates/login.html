<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CEPANIM - Plataforma de Registro Empresarial</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}" />
</head>
<body class="login">
  <div class="login-card">
    <div class="login-top-bar"></div>
    <div class="login-body">
      <div class="login-logo">CEPANIM</div>
      <div class="login-logo-line"></div>
      <p class="login-subtitle">Plataforma de Registro Empresarial</p>
      <p class="login-desc">Accede o regístrate para brindar tus servicios</p>

      <form method="POST" action="{{ url_for('login') }}" novalidate>
        <label class="login-label" for="inputRuc">Ingrese su RUC o NIT</label>
        <input
          class="login-input"
          id="inputRuc"
          name="ruc"
          type="text"
          placeholder="Ejemplo: 123456-1-789012"
          autocomplete="off"
          required
        />

        {% if error %}
          <p class="error-msg">{{ error }}</p>
        {% endif %}

        <div class="login-actions">
          <button class="btn btn-primary" type="submit" name="action" value="registrar">
            &#127970; Registrarse
          </button>
          <button class="btn btn-primary" type="submit" name="action" value="iniciar">
            &#128274; Iniciar Sesión
          </button>
        </div>
      </form>

      <a class="login-back" href="{{ url_for('index') }}">&#8592; Volver al inicio</a>
    </div>
  </div>
</body>
</html>
